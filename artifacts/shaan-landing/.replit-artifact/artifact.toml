kind = "web"
previewPath = "/"
title = "Shaan Soni — The Systems Behind The Build"
version = "1.0.0"
id = "artifacts/shaan-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20109

[services.development]
run = "pnpm --filter @workspace/shaan-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shaan-landing", "run", "build" ]
publicDir = "artifacts/shaan-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20109"
BASE_PATH = "/"
